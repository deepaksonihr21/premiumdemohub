<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak Soni | Premium Elite Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #bc13fe; 
            --bg: #000000;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- Custom Cursor (Premium Feel) --- */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: 0.1s ease-out;
        }

        /* --- Hero: Cinematic Reveal --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 12vw, 7rem);
            line-height: 0.8;
            letter-spacing: -5px;
            text-transform: uppercase;
            animation: reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        @keyframes reveal {
            from { transform: translateY(100px); opacity: 0; filter: blur(20px); }
            to { transform: translateY(0); opacity: 1; filter: blur(0); }
        }

        .premium-tag {
            font-size: 0.8rem;
            letter-spacing: 8px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 800;
        }

        /* --- The "Scroll Experience" Sections --- */
        .section {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            position: relative;
        }

        .reveal-box {
            max-width: 900px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
        }

        .reveal-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .big-text {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Premium Showcase Reel --- */
        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            margin-bottom: 50px;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- Exclusive CTA --- */
        .premium-cta {
            padding: 30px 80px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .premium-cta:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.6);
        }

        footer {
            padding: 100px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #444;
        }

    </style>
</head>
<body>

    <div class="cursor-glow" id="glow"></div>

    <section class="hero">
        <span class="premium-tag">Digital Architecture</span>
        <h1>ELITE<br>LEGACY</h1>
        <p style="margin-top: 30px; color: #555; letter-spacing: 2px;">BY DEEPAKSONIHR21</p>
    </section>

    <section class="section">
        <div class="reveal-box" id="box1">
            <h2 class="big-text">We don't build websites.<br>We build Empires.</h2>
            <div class="video-wrapper">
                <video autoplay muted loop playsinline>
                    <source src="v1.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="reveal-box" id="box2">
            <h2 class="big-text">Engineered for the<br>Top 1% Creators.</h2>
            <p style="color: #888; font-size: 1.2rem; margin-bottom: 50px;">High-speed code, zero templates, and cinematic storytelling in every pixel.</p>
            <a href="https://www.instagram.com/deepaksonihr21" class="premium-cta">Secure Your Slot 👑</a>
        </div>
    </section>

    <footer>
        MMXXVI • THE PREMIUM STANDARD • DEEPAKSONIHR21
    </footer>

    <script>
        // Cursor Glow Follow
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Simple Intersection Observer for Reveal Effect
        const boxes = document.querySelectorAll('.reveal-box');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        boxes.forEach(box => observer.observe(box));
    </script>

</body>
</html>
